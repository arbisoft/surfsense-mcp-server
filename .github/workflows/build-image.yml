name: Build & push surfsense-mcp image

# Triggers:
#   - tag push matching v*.*.*  (canonical release path)
#   - workflow_dispatch         (manual; lets us push a `dev-*` tag without cutting a release)
#
# Image: ghcr.io/pressingly/surfsense-mcp
#
# Prerequisite: the `pressingly` GitHub org must allow this repo
# (arbisoft/surfsense-mcp-server) to push to its container registry. If the
# packages live under arbisoft instead, change the image namespace in this
# file and in foss-server-bundle-devstack/docker-compose.yml.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (e.g. dev-foo)"
        required: true
        default: "dev-manual"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pressingly/surfsense-mcp

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
